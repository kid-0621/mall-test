name: Mall API 性能测试 (Locust)

on:
  # 手动触发（推荐）
  workflow_dispatch:
    inputs:
      users:
        description: '并发用户数'
        required: false
        type: number
        default: 100
      spawn_rate:
        description: '每秒启动用户数'
        required: false
        type: number
        default: 10
      run_time:
        description: '运行时长 (如 5m, 10m, 1h)'
        required: false
        type: string
        default: '5m'
      scenario:
        description: '测试场景'
        required: false
        type: choice
        options:
          - mixed (混合场景)
          - read-only (纯读)
        default: 'mixed (混合场景)'

  # 每周六凌晨 2:00 (UTC) 自动运行 → 北京时间周六 10:00
  schedule:
    - cron: "0 2 * * 6"

  # 推送到 perf 分支时触发
  push:
    branches: [perf]

jobs:
  performance-test:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 最长 2 小时（稳定性测试需要）

    # MySQL 服务（复用现有配置）
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mall
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-retries=10

    steps:
      # 1. 拉取测试代码
      - name: Checkout 测试代码
        uses: actions/checkout@v4

      # 2. 配置 Python
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install locust

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 3. 初始化数据库
      - name: 初始化数据库（导入 mall SQL）
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client

          echo "等待 MySQL 就绪..."
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent 2>/dev/null; then
              echo "✅ MySQL 就绪"
              break
            fi
            echo "   重试 $i/30..."
            sleep 3
          done

          git clone --depth 1 https://github.com/macrozheng/mall.git /tmp/mall-sql
          echo "导入 mall.sql..."
          mysql -h 127.0.0.1 -u root -proot mall < /tmp/mall-sql/document/sql/mall.sql
          # 导入更多测试数据（可选：复制 mall-data.sql 或手动插入）
          echo "✅ 数据库初始化完成"

      # 4. 编译并启动 mall 后端
      - name: 编译并启动 mall 后端
        run: |
          git clone --depth 1 https://github.com/macrozheng/mall.git /tmp/mall

          cd /tmp/mall
          mvn clean install -DskipTests -q -Ddocker.skip=true

          cd /tmp/mall/mall-admin

          nohup java -jar target/mall-admin-*.jar \
            --spring.datasource.url="jdbc:mysql://127.0.0.1:3306/mall?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true" \
            --spring.datasource.username=root \
            --spring.datasource.password=root \
            --server.port=8080 \
            > /tmp/mall-backend.log 2>&1 &

          MALL_PID=$!
          echo "mall 后端 PID: $MALL_PID"

          echo "等待 Spring Boot 初始化（30秒）..."
          sleep 30

          if kill -0 $MALL_PID 2>/dev/null; then
            echo "✅ Java 进程仍在运行（PID $MALL_PID）"
          else
            echo "❌ Java 进程已退出！打印日志："
            cat /tmp/mall-backend.log | tail -80
            exit 1
          fi

      # 5. 等待后端就绪
      - name: 等待后端服务就绪
        run: |
          echo "开始探测 mall 后端端口..."
          READY=0
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080 2>/dev/null || echo "000")
            HTTP_CODE=$(echo "$HTTP_CODE" | tr -d '[:space:]')

            echo "   第 $i 次: HTTP=$HTTP_CODE"

            if [ "$HTTP_CODE" != "000" ] && [ -n "$HTTP_CODE" ]; then
              echo "✅ mall 后端就绪 (HTTP $HTTP_CODE)"
              READY=1
              break
            fi

            sleep 5
          done

          if [ "$READY" -eq 0 ]; then
            echo "❌ 后端未在 5 分钟内就绪！打印日志："
            cat /tmp/mall-backend.log | tail -100
            pgrep -f "mall-admin" && echo "Java 进程还在运行" || echo "Java 进程已退出"
            ss -tlnp 2>/dev/null | grep 8080 || echo "8080 端口未被监听"
            exit 1
          fi

      # 6. 预热（发送少量请求让 JIT/JVM 热身）
      - name: 预热后端
        run: |
          echo "预热后端（20 并发，1 分钟）..."
          locust -f performance/locustfile.py \
            --host=http://localhost:8080 \
            --headless \
            --users 20 \
            --spawn-rate 5 \
            --run-time 1m 2>&1 | tail -5
          echo "✅ 预热完成"

      # 7. 运行性能测试
      - name: 运行 Locust 性能测试
        id: locust
        run: |
          USERS="${{ github.event.inputs.users || 100 }}"
          SPAWN_RATE="${{ github.event.inputs.spawn_rate || 10 }}"
          RUN_TIME="${{ github.event.inputs.run_time || '5m' }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          echo "========================================="
          echo "  Locust 性能测试"
          echo "  并发用户: $USERS"
          echo "  启动速率: $SPAWN_RATE/s"
          echo "  运行时长: $RUN_TIME"
          echo "  时间戳:   $TIMESTAMP"
          echo "========================================="

          mkdir -p performance/report

          # 运行 Locust
          locust -f performance/locustfile.py \
            --host=http://localhost:8080 \
            --headless \
            --users $USERS \
            --spawn-rate $SPAWN_RATE \
            --run-time $RUN_TIME \
            --html=performance/report/perf_report_${TIMESTAMP}.html \
            --csv=performance/report/perf_result_${TIMESTAMP} \
            2>&1 | tee performance/report/locust_output_${TIMESTAMP}.log

          LOCUST_EXIT=$?
          echo "locust_exit_code=$LOCUST_EXIT" >> $GITHUB_OUTPUT

          # 检查是否所有用户都登录失败
          if grep -q "ConnectionRefusedError\|ConnectionError" performance/report/locust_output_${TIMESTAMP}.log; then
            echo "❌ 连接失败！请检查后端状态"
          fi

      # 8. 提取性能指标（用于后续 Trend 对比）
      - name: 提取性能指标
        id: metrics
        if: always()
        run: |
          # 从 CSV 中提取性能指标
          CSV_FILE=$(ls performance/report/perf_result_*_stats.csv 2>/dev/null | head -1)

          if [ -n "$CSV_FILE" ] && [ -f "$CSV_FILE" ]; then
            echo "提取性能指标: $CSV_FILE"

            # 总请求数
            TOTAL_REQUESTS=$(tail -n +2 "$CSV_FILE" | awk -F',' '{sum+=$3} END {print sum}')
            echo "total_requests=$TOTAL_REQUESTS" >> $GITHUB_OUTPUT

            # 总失败数
            TOTAL_FAILURES=$(tail -n +2 "$CSV_FILE" | awk -F',' '{sum+=$4} END {print sum}')
            echo "total_failures=$TOTAL_FAILURES" >> $GITHUB_OUTPUT

            # 平均 RT（加权）
            AVG_RT=$(tail -n +2 "$CSV_FILE" | awk -F',' '{sum+=$6*$3} END {printf "%.0f", sum==0?0:sum/sum}' 2>/dev/null)
            echo "avg_rt_ms=$AVG_RT" >> $GITHUB_OUTPUT

            # 失败率
            if [ "$TOTAL_REQUESTS" -gt 0 ]; then
              FAIL_RATE=$(awk "BEGIN {printf \"%.2f\", ($TOTAL_FAILURES/$TOTAL_REQUESTS)*100}")
            else
              FAIL_RATE="0.00"
            fi
            echo "fail_rate=$FAIL_RATE" >> $GITHUB_OUTPUT

            echo "========================================="
            echo "  性能指标汇总"
            echo "  总请求数:  $TOTAL_REQUESTS"
            echo "  总失败数:  $TOTAL_FAILURES"
            echo "  失败率:    $FAIL_RATE%"
            echo "  平均 RT:   ${AVG_RT}ms"
            echo "========================================="
          else
            echo "⚠️ 未找到 CSV 结果文件"
            echo "total_requests=0" >> $GITHUB_OUTPUT
            echo "total_failures=0" >> $GITHUB_OUTPUT
            echo "avg_rt_ms=0" >> $GITHUB_OUTPUT
            echo "fail_rate=0" >> $GITHUB_OUTPUT
          fi

      # 9. 性能阈值检查（可选：阻断不达标的构建）
      - name: 性能阈值检查
        if: always() && steps.metrics.outputs.total_requests != '0'
        run: |
          FAIL_RATE="${{ steps.metrics.outputs.fail_rate }}"
          AVG_RT="${{ steps.metrics.outputs.avg_rt_ms }}"

          echo "========================================="
          echo "  性能阈值检查"
          echo "  失败率阈值: < 5%"
          echo "  平均 RT 阈值: < 5000ms"
          echo "  实际失败率:  $FAIL_RATE%"
          echo "  实际平均 RT: ${AVG_RT}ms"
          echo "========================================="

          PASS=true

          # 检查失败率
          if awk "BEGIN {exit ($FAIL_RATE > 5 ? 1 : 0)}"; then
            echo "✅ 失败率通过: $FAIL_RATE% < 5%"
          else
            echo "❌ 失败率超标: $FAIL_RATE% ≥ 5%"
            PASS=false
          fi

          # 检查平均 RT
          if awk "BEGIN {exit ($AVG_RT > 5000 ? 1 : 0)}"; then
            echo "✅ 平均 RT 通过: ${AVG_RT}ms < 5000ms"
          else
            echo "❌ 平均 RT 超标: ${AVG_RT}ms ≥ 5000ms"
            PASS=false
          fi

          if [ "$PASS" = "false" ]; then
            echo "========================================="
            echo "  ⚠️ 性能测试未通过阈值！"
            echo "  请检查上方报告了解详情"
            echo "========================================="
            # 注意：这里不 exit 1，因为性能波动可能正常
            # 如果需要在 CI 中"硬阻断"，取消下面这行注释：
            # exit 1
          else
            echo "✅ 全部性能阈值通过！"
          fi

      # 10. 上传 HTML 报告
      - name: 上传性能测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-performance-report
          path: |
            performance/report/perf_report_*.html
            performance/report/perf_result_*.csv
            performance/report/locust_output_*.log
          retention-days: 14

      # 11. 输出摘要
      - name: 性能测试摘要
        if: always()
        run: |
          echo "========================================="
          echo "📊 性能测试完成！"
          echo ""
          echo "测试配置:"
          echo "  并发用户: ${{ github.event.inputs.users || 100 }}"
          echo "  运行时长: ${{ github.event.inputs.run_time || '5m' }}"
          echo ""
          echo "关键指标:"
          echo "  总请求数: ${{ steps.metrics.outputs.total_requests }}"
          echo "  失败率:   ${{ steps.metrics.outputs.fail_rate }}%"
          echo "  平均 RT:  ${{ steps.metrics.outputs.avg_rt_ms }}ms"
          echo ""
          echo "📥 下载报告: Actions → Artifacts → locust-performance-report"
          echo "========================================="

      # 12. 清理
      - name: 清理后端进程
        if: always()
        run: |
          pkill -f "mall-admin" || true
          echo "mall 后端进程已清理"
