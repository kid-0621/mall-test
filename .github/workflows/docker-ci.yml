name: Mall API Test (Docker)

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 0:00（北京时间 8:00）

jobs:
  api-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # MySQL 服务
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mall
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-retries=10

    steps:
      # 1. 拉取测试代码
      - name: Checkout 测试代码
        uses: actions/checkout@v4

      # 2. 配置 Python
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"


      # 3. 编译 mall 后端并直接运行（不用 Docker，避免 Docker-in-Docker 网络问题）
      - name: 编译并启动 mall 后端
        run: |
          git clone --depth 1 https://github.com/macrozheng/mall.git /tmp/mall

          cd /tmp/mall
          mvn clean install -DskipTests -q -Ddocker.skip=true

          cd /tmp/mall/mall-admin

          # 不用 Docker，直接后台运行 JAR
          nohup java -jar target/mall-admin-*.jar \
            --spring.datasource.url="jdbc:mysql://localhost:3306/mall?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true" \
            --spring.datasource.username=root \
            --spring.datasource.password=root \
            --server.port=8080 \
            > /tmp/mall-backend.log 2>&1 &
          
          MALL_PID=$!
          echo "mall 后端 PID: $MALL_PID"
          
          # 先等 30 秒让 Spring Boot 初始化
          echo "等待 Spring Boot 初始化（30秒）..."
          sleep 30

          # 检查进程是否还活着
          if kill -0 $MALL_PID 2>/dev/null; then
            echo "✅ Java 进程仍在运行（PID $MALL_PID）"
          else
            echo "❌ Java 进程已退出！打印日志："
            cat /tmp/mall-backend.log | tail -80
            exit 1
          fi


      # 4. 等待后端就绪（修复版 — 严格判断 + 崩溃日志）
      - name: 等待后端服务就绪
        run: |
          echo "开始探测 mall 后端端口..."
          READY=0
          for i in $(seq 1 60); do
            # 探测端口，只取 HTTP 状态码并去空白
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080 2>/dev/null || echo "000")
            HTTP_CODE=$(echo "$HTTP_CODE" | tr -d '[:space:]')

            echo "   第 $i 次: HTTP=$HTTP_CODE"

            # 只有 000 才算没就绪，其他任何响应（200/404/50X）都说明服务在运行
            if [ "$HTTP_CODE" != "000" ] && [ -n "$HTTP_CODE" ]; then
              echo "✅ mall 后端就绪 (HTTP $HTTP_CODE)"
              READY=1
              break
            fi

            sleep 5
          done

          if [ "$READY" -eq 0 ]; then
            echo "❌ 后端未在 5 分钟内就绪！打印日志："
            cat /tmp/mall-backend.log | tail -100

            # 检查 Java 进程是否还在
            echo "--- 进程检查 ---"
            pgrep -f "mall-admin" && echo "Java 进程还在运行" || echo "Java 进程已退出"

            # 检查 8080 端口
            echo "--- 端口检查 ---"
            ss -tlnp 2>/dev/null | grep 8080 || echo "8080 端口未被监听"

            exit 1
          fi


      # 5. 运行测试
      - name: 运行 pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest testcases/ -v --alluredir=allure-results


      # 6. 生成 Allure 报告
      - name: 安装 Allure CLI & 生成报告
        if: always()
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz
          tar -zxvf allure-2.32.0.tgz -C /opt/
          sudo ln -s /opt/allure-2.32.0/bin/allure /usr/local/bin/allure
          allure generate allure-results -o allure-report --clean

      # 7. 上传报告
      - name: 上传 Allure 报告（Artifact）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7

      # 8. 清理（kill Java 进程）
      - name: 清理后端进程
        if: always()
        run: |
          pkill -f "mall-admin" || true
          echo "mall 后端进程已清理"
